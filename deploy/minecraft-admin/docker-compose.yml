services:
  admin:
    container_name: jamplay-admin
    image: jamplay-admin
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_REPO: ${GIT_REPO}
        GIT_BRANCH: ${GIT_BRANCH:-main}
        GIT_ALPINE_VERSION: ${GIT_ALPINE_VERSION:-2.52.0}
    restart: unless-stopped
    networks:
      - jamplay-edge
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 5

networks:
  jamplay-edge:
    external: true
